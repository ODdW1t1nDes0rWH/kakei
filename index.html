<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計帳">
<meta name="theme-color" content="#1A1A1A">
<title>家計帳</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4EF;
  --surface: #FFFFFF;
  --border: #E5DED4;
  --text: #1A1A1A;
  --muted: #8A8278;
  --accent: #B5825A;
  --green: #4A7A65;
  --red: #B55A5A;
  --blue: #4A6A8A;
  --purple: #7A5A9A;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Shippori Mincho', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
}
.header {
  background: #1A1A1A; color: #F7F4EF;
  padding: calc(14px + var(--safe-top)) 20px 14px;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 2px solid var(--accent);
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: 1px; }
.header-sub { font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 2px; }
.year-nav { display: flex; align-items: center; gap: 10px; }
.year-btn {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: #F7F4EF; width: 30px; height: 30px; border-radius: 4px;
  font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.year-label { font-family: 'DM Mono', monospace; font-size: 17px; min-width: 50px; text-align: center; }
.tabbar {
  display: flex; background: #EEEAE3;
  border-bottom: 1px solid var(--border);
  position: sticky; top: calc(64px + var(--safe-top)); z-index: 90;
}
.tab {
  flex: 1; padding: 11px 6px; text-align: center; font-size: 13px;
  border: none; border-bottom: 3px solid transparent;
  cursor: pointer; background: none; font-family: inherit; color: var(--muted);
  letter-spacing: 1px; transition: all .2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); background: white; }
.month-scroll {
  overflow-x: auto; padding: 14px 16px 0;
  display: flex; gap: 7px; scrollbar-width: none;
}
.month-scroll::-webkit-scrollbar { display: none; }
.month-chip {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px; font-size: 13px;
  border: 1px solid var(--border); background: white; cursor: pointer;
  font-family: inherit; color: var(--muted); transition: all .2s;
}
.month-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
main { padding: 14px 16px calc(32px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
.kpi-card {
  background: white; border: 1px solid var(--border);
  border-top: 3px solid var(--border); border-radius: 8px; padding: 13px 15px;
}
.kpi-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; }
.kpi-value { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; }
.kpi-value.green  { color: var(--green); }
.kpi-value.red    { color: var(--red); }
.kpi-value.blue   { color: var(--blue); }
.kpi-value.purple { color: var(--purple); }
.section-title {
  font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  margin: 18px 0 9px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.list-card { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.list-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 15px; border-bottom: 1px solid #F5F0E8; font-size: 14px;
}
.list-row:last-child { border-bottom: none; }
.list-row-value { font-family: 'DM Mono', monospace; font-size: 13px; }
.edit-btn {
  width: 100%; padding: 13px; background: #1A1A1A; color: #F7F4EF;
  border: none; border-radius: 8px; font-size: 14px; font-family: inherit;
  letter-spacing: 2px; cursor: pointer; margin-top: 18px;
}
.edit-btn:active { background: #333; }
.settings-btn {
  width: 100%; padding: 11px; background: none; color: var(--muted);
  border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
  font-family: inherit; letter-spacing: 1px; cursor: pointer; margin-top: 10px;
}
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto;
  padding-bottom: calc(16px + var(--safe-bottom));
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  position: sticky; top: 0; background: var(--bg);
  padding: 15px 18px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; z-index: 10;
}
.modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
.modal-actions { display: flex; gap: 8px; }
.btn-cancel {
  padding: 7px 14px; background: none; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--muted);
}
.btn-save {
  padding: 7px 16px; background: var(--green); color: white;
  border: none; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer;
}
.preview-strip {
  display: flex; gap: 6px; padding: 10px 16px;
  background: #EEEAE3; border-bottom: 1px solid var(--border);
}
.preview-item { flex: 1; text-align: center; }
.preview-item-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 3px; }
.preview-item-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
.form-section { padding: 14px 18px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 16px; font-family: 'DM Mono', monospace; background: white;
  color: var(--text); outline: none; transition: border-color .2s;
}
.form-input:focus { border-color: var(--accent); }
.form-input.name-input { font-family: 'Shippori Mincho', serif; font-size: 14px; }
.form-divider { height: 1px; background: var(--border); }
.form-subtitle {
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
  padding: 12px 18px 4px; text-transform: uppercase;
}
.year-chart-wrap { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.year-chart { display: flex; gap: 3px; align-items: flex-end; height: 100px; margin-bottom: 10px; }
.year-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.year-col-bars { display: flex; gap: 1px; align-items: flex-end; height: 88px; }
.year-bar { width: 5px; border-radius: 2px 2px 0 0; transition: height .5s ease; min-height: 2px; }
.year-col-label { font-size: 9px; color: var(--muted); margin-top: 4px; }
.legend { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }
.year-table { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 14px; }
.year-table-header {
  display: grid; grid-template-columns: 38px 1fr 1fr 1fr;
  padding: 8px 12px; background: #EEEAE3;
  font-size: 10px; letter-spacing: 1px; color: var(--muted);
}
.year-table-header span:not(:first-child) { text-align: right; }
.year-table-row {
  display: grid; grid-template-columns: 38px 1fr 1fr 1fr;
  padding: 9px 12px; border-top: 1px solid #F5F0E8; font-size: 12px;
}
.year-table-row span:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; }
.year-table-row.current-month { background: #FFF8F2; }
.empty-state { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 14px; line-height: 1.8; }
.settings-section { padding: 14px 18px; }
.settings-section h3 { font-size: 12px; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="header-sub">Household Finance</div>
      <div class="header-title">家計帳</div>
    </div>
    <div class="year-nav">
      <button class="year-btn" onclick="changeYear(-1)">◀</button>
      <div class="year-label" id="yearLabel"></div>
      <button class="year-btn" onclick="changeYear(1)">▶</button>
    </div>
  </div>
</header>

<div class="tabbar">
  <button class="tab active" onclick="switchTab('month',this)">月別</button>
  <button class="tab" onclick="switchTab('year',this)">年間</button>
</div>

<div id="monthChips" class="month-scroll"></div>
<main id="mainContent"></main>

<!-- Edit Modal -->
<div class="modal-overlay" id="editOverlay" onclick="handleOverlay(event,'editOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editTitle"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('editOverlay')">キャンセル</button>
        <button class="btn-save" onclick="saveEdit()">保存</button>
      </div>
    </div>
    <div class="preview-strip">
      <div class="preview-item">
        <div class="preview-item-label">収入計</div>
        <div class="preview-item-value green" id="pvIncome">—</div>
      </div>
      <div class="preview-item">
        <div class="preview-item-label">支出計</div>
        <div class="preview-item-value red" id="pvExpense">—</div>
      </div>
      <div class="preview-item">
        <div class="preview-item-label">収支</div>
        <div class="preview-item-value" id="pvBalance">—</div>
      </div>
      <div class="preview-item">
        <div class="preview-item-label">積立</div>
        <div class="preview-item-value blue" id="pvSavings">—</div>
      </div>
    </div>
    <div id="editForm"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsOverlay" onclick="handleOverlay(event,'settingsOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">設定</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('settingsOverlay')">キャンセル</button>
        <button class="btn-save" onclick="saveSettings()">保存</button>
      </div>
    </div>
    <div id="settingsForm"></div>
  </div>
</div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const STORAGE_KEY = 'kakei-v3';

const now = new Date();
let currentYear  = now.getFullYear();
let currentMonth = now.getMonth();
let currentTab   = 'month';
let draft        = null;
let settingsDraft = null;

function defaultConfig() { return { cards: ['カード1', 'カード2'] }; }

function loadAll()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveAll(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getConfig() { return loadAll().config || defaultConfig(); }
function getMonth(y, m) {
  return loadAll()[`${y}-${String(m+1).padStart(2,'0')}`] || defaultMonthData();
}
function defaultMonthData() {
  return {
    income:  { salary:0, bonus:0, side:0, other:0 },
    expense: { cash:0, cards:[0,0] },
    savings: { amount:0 },
    balance: { amount:'' }
  };
}

const fmt = n => n ? '¥' + Number(n).toLocaleString() : '—';
const num = v => Number(v) || 0;
const totalIncome  = d => num(d.income.salary) + num(d.income.bonus) + num(d.income.side) + num(d.income.other);
const totalExpense = d => num(d.expense.cash) + (d.expense.cards||[]).reduce((s,v)=>s+num(v),0);
const totalSavings = d => num(d.savings.amount);

function init() {
  document.getElementById('yearLabel').textContent = currentYear;
  renderMonthChips();
  render();
}

function changeYear(delta) {
  currentYear += delta;
  document.getElementById('yearLabel').textContent = currentYear;
  renderMonthChips();
  render();
}

function renderMonthChips() {
  const el = document.getElementById('monthChips');
  if (currentTab !== 'month') { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = MONTHS.map((m,i) =>
    `<button class="month-chip ${i===currentMonth?'active':''}" onclick="selectMonth(${i})">${m}</button>`
  ).join('');
  setTimeout(() => {
    const a = el.querySelector('.active');
    if (a) a.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

function selectMonth(m) { currentMonth = m; renderMonthChips(); render(); }

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderMonthChips();
  render();
}

function render() { currentTab === 'month' ? renderMonth() : renderYear(); }

function renderMonth() {
  const d   = getMonth(currentYear, currentMonth);
  const cfg = getConfig();
  const inc = totalIncome(d);
  const exp = totalExpense(d);
  const sav = totalSavings(d);
  const bal = inc - exp - sav;
  const hasData = inc || exp || sav || d.balance.amount;
  const balCol  = bal >= 0 ? 'green' : 'red';

  let html = `
    <div class="kpi-grid">
      <div class="kpi-card" style="border-top-color:var(--green)">
        <div class="kpi-label">収入合計</div>
        <div class="kpi-value green">${fmt(inc)}</div>
      </div>
      <div class="kpi-card" style="border-top-color:var(--red)">
        <div class="kpi-label">支出合計</div>
        <div class="kpi-value red">${fmt(exp)}</div>
      </div>
      <div class="kpi-card" style="border-top-color:var(--blue)">
        <div class="kpi-label">積立貯蓄</div>
        <div class="kpi-value blue">${fmt(sav)}</div>
      </div>
      <div class="kpi-card" style="border-top-color:var(--${balCol})">
        <div class="kpi-label">収支差引</div>
        <div class="kpi-value ${balCol}">${hasData ? fmt(bal) : '—'}</div>
      </div>
    </div>`;

  if (hasData) {
    html += `<div class="section-title">収入内訳</div><div class="list-card">`;
    [['salary','💴 給与（手取り）'],['bonus','🎁 ボーナス'],['side','💼 副業・フリーランス'],['other','📦 その他']]
      .forEach(([k,l]) => {
        const v = num(d.income[k]);
        if (!v && k !== 'salary') return;
        html += `<div class="list-row"><span>${l}</span><span class="list-row-value" style="color:var(--green)">${fmt(v)}</span></div>`;
      });
    html += `</div>`;

    html += `<div class="section-title">支出内訳</div><div class="list-card">`;
    (cfg.cards||[]).forEach((name,i) => {
      html += `<div class="list-row"><span>💳 ${name}</span><span class="list-row-value" style="color:var(--red)">${fmt((d.expense.cards||[])[i])}</span></div>`;
    });
    html += `<div class="list-row"><span>💵 現金</span><span class="list-row-value" style="color:var(--red)">${fmt(d.expense.cash)}</span></div>`;
    html += `</div>`;

    html += `<div class="section-title">貯蓄・資産</div><div class="list-card">`;
    html += `<div class="list-row"><span>🏦 積立額</span><span class="list-row-value" style="color:var(--blue)">${fmt(sav)}</span></div>`;
    html += `<div class="list-row"><span>📊 口座残高</span><span class="list-row-value" style="color:var(--purple)">${d.balance.amount ? fmt(d.balance.amount) : '—'}</span></div>`;
    html += `</div>`;
  } else {
    html += `<div class="empty-state">まだデータがありません<br><small>下のボタンから入力できます</small></div>`;
  }

  html += `<button class="edit-btn" onclick="openEdit()">✎ ${MONTHS[currentMonth]}を入力・編集する</button>`;
  html += `<button class="settings-btn" onclick="openSettings()">⚙ カード名などの設定</button>`;
  document.getElementById('mainContent').innerHTML = html;
}

function renderYear() {
  const summary = Array.from({length:12}, (_,i) => {
    const d = getMonth(currentYear, i);
    return { m:i, inc:totalIncome(d), exp:totalExpense(d), sav:totalSavings(d) };
  });
  const maxV   = Math.max(...summary.map(s => Math.max(s.inc, s.exp+s.sav)), 1);
  const totInc = summary.reduce((s,m)=>s+m.inc,0);
  const totExp = summary.reduce((s,m)=>s+m.exp,0);
  const totSav = summary.reduce((s,m)=>s+m.sav,0);
  const totBal = totInc - totExp - totSav;

  let html = `
    <div class="kpi-grid" style="margin-top:14px">
      <div class="kpi-card" style="border-top-color:var(--green)"><div class="kpi-label">年収入合計</div><div class="kpi-value green">${fmt(totInc)}</div></div>
      <div class="kpi-card" style="border-top-color:var(--red)"><div class="kpi-label">年支出合計</div><div class="kpi-value red">${fmt(totExp)}</div></div>
      <div class="kpi-card" style="border-top-color:var(--blue)"><div class="kpi-label">年積立合計</div><div class="kpi-value blue">${fmt(totSav)}</div></div>
      <div class="kpi-card" style="border-top-color:var(--${totBal>=0?'green':'red'})"><div class="kpi-label">年間収支</div><div class="kpi-value ${totBal>=0?'green':'red'}">${fmt(totBal)}</div></div>
    </div>
    <div class="section-title">月別グラフ</div>
    <div class="year-chart-wrap">
      <div class="year-chart">
        ${summary.map(s => {
          const ih = Math.round(s.inc/maxV*86);
          const eh = Math.round(s.exp/maxV*86);
          const sh = Math.round(s.sav/maxV*86);
          return `<div class="year-col">
            <div class="year-col-bars">
              <div class="year-bar" style="height:${ih}px;background:var(--green)"></div>
              <div class="year-bar" style="height:${eh}px;background:var(--red)"></div>
              <div class="year-bar" style="height:${sh}px;background:var(--blue)"></div>
            </div>
            <div class="year-col-label">${s.m+1}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>収入</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>支出</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>積立</div>
      </div>
    </div>
    <div class="year-table">
      <div class="year-table-header"><span>月</span><span>収入</span><span>支出</span><span>収支</span></div>
      ${summary.map(s => {
        const bal  = s.inc - s.exp - s.sav;
        const hasd = s.inc || s.exp || s.sav;
        return `<div class="year-table-row ${s.m===currentMonth?'current-month':''}">
          <span style="color:${s.m===currentMonth?'var(--accent)':'var(--muted)'}">${s.m+1}月</span>
          <span style="color:var(--green)">${s.inc?fmt(s.inc):'—'}</span>
          <span style="color:var(--red)">${s.exp?fmt(s.exp):'—'}</span>
          <span style="color:${bal>=0?'var(--green)':'var(--red)'}">${hasd?fmt(bal):'—'}</span>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('mainContent').innerHTML = html;
}

function openEdit() {
  const d   = getMonth(currentYear, currentMonth);
  const cfg = getConfig();
  draft = JSON.parse(JSON.stringify(d));
  if (!draft.expense.cards) draft.expense.cards = [];
  while (draft.expense.cards.length < cfg.cards.length) draft.expense.cards.push(0);

  document.getElementById('editTitle').textContent = `${currentYear}年 ${MONTHS[currentMonth]}`;
  renderEditForm(cfg);
  updatePreview();
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderEditForm(cfg) {
  document.getElementById('editForm').innerHTML = `
    <div class="form-subtitle">収入</div>
    <div class="form-section">
      <div class="form-group">
        <label class="form-label">💴 給与（手取り）</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="例：550000"
          value="${draft.income.salary||''}" oninput="draft.income.salary=this.value;updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">🎁 ボーナス</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="0"
          value="${draft.income.bonus||''}" oninput="draft.income.bonus=this.value;updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">💼 副業・フリーランス収入</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="0"
          value="${draft.income.side||''}" oninput="draft.income.side=this.value;updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">📦 その他（配当・還付金など）</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="0"
          value="${draft.income.other||''}" oninput="draft.income.other=this.value;updatePreview()">
      </div>
    </div>
    <div class="form-divider"></div>
    <div class="form-subtitle">支出</div>
    <div class="form-section">
      ${(cfg.cards||[]).map((name,i) => `
        <div class="form-group">
          <label class="form-label">💳 ${name}</label>
          <input class="form-input" type="number" inputmode="numeric" placeholder="0"
            value="${draft.expense.cards[i]||''}" oninput="draft.expense.cards[${i}]=this.value;updatePreview()">
        </div>`).join('')}
      <div class="form-group">
        <label class="form-label">💵 現金</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="0"
          value="${draft.expense.cash||''}" oninput="draft.expense.cash=this.value;updatePreview()">
      </div>
    </div>
    <div class="form-divider"></div>
    <div class="form-subtitle">貯蓄・資産</div>
    <div class="form-section">
      <div class="form-group">
        <label class="form-label">🏦 今月の積立額</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="例：100000"
          value="${draft.savings.amount||''}" oninput="draft.savings.amount=this.value;updatePreview()">
      </div>
      <div class="form-group">
        <label class="form-label">📊 口座残高（月末時点）</label>
        <input class="form-input" type="number" inputmode="numeric" placeholder="例：3500000"
          value="${draft.balance.amount||''}" oninput="draft.balance.amount=this.value">
      </div>
    </div>`;
}

function updatePreview() {
  if (!draft) return;
  const inc = totalIncome(draft), exp = totalExpense(draft), sav = totalSavings(draft);
  const bal = inc - exp - sav;
  document.getElementById('pvIncome').textContent  = fmt(inc);
  document.getElementById('pvExpense').textContent = fmt(exp);
  document.getElementById('pvSavings').textContent = fmt(sav);
  const pb = document.getElementById('pvBalance');
  pb.textContent  = fmt(bal);
  pb.style.color  = bal >= 0 ? 'var(--green)' : 'var(--red)';
}

function saveEdit() {
  const all = loadAll();
  all[`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`] = draft;
  saveAll(all);
  closeModal('editOverlay');
  render();
}

function openSettings() {
  settingsDraft = JSON.parse(JSON.stringify(getConfig()));
  document.getElementById('settingsForm').innerHTML = `
    <div class="settings-section">
      <h3>クレジットカード名</h3>
      ${(settingsDraft.cards||[]).map((name,i) => `
        <div class="form-group">
          <label class="form-label">カード ${i+1}</label>
          <input class="form-input name-input" type="text" placeholder="カード名"
            value="${name}" oninput="settingsDraft.cards[${i}]=this.value">
        </div>`).join('')}
    </div>`;
  document.getElementById('settingsOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function saveSettings() {
  const all = loadAll();
  all.config = settingsDraft;
  saveAll(all);
  closeModal('settingsOverlay');
  render();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlay(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', e => e.waitUntil(
      caches.open('kakei-v3').then(c => c.addAll(['./', './index.html']))
    ));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request))
    ));
  `;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], {type:'text/javascript'})));
}

init();
</script>
</body>
</html>
