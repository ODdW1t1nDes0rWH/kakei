<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計">
<meta name="theme-color" content="#1A1A1A">
<title>家計ダッシュボード</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --border: #E5DED4;
    --text: #1A1A1A;
    --muted: #8A8278;
    --accent: #B5825A;
    --green: #4A7A65;
    --red: #B55A5A;
    --blue: #4A6A8A;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Shippori Mincho', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  /* Header */
  .header {
    background: #1A1A1A;
    color: #F7F4EF;
    padding: calc(16px + var(--safe-top)) 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--accent);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: 1px; }
  .header-sub { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
  .year-nav { display: flex; align-items: center; gap: 12px; }
  .year-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #F7F4EF; width: 32px; height: 32px; border-radius: 4px;
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .year-label { font-family: 'DM Mono', monospace; font-size: 18px; min-width: 52px; text-align: center; }

  /* Tab bar */
  .tabbar {
    display: flex;
    background: #EEEAE3;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: calc(68px + var(--safe-top));
    z-index: 90;
  }
  .tab {
    flex: 1; padding: 12px 8px; text-align: center; font-size: 13px;
    border-bottom: 3px solid transparent; cursor: pointer; background: none; border-top: none;
    border-left: none; border-right: none; font-family: inherit; color: var(--muted);
    letter-spacing: 1px; transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: white; }

  /* Month chips */
  .month-scroll { overflow-x: auto; padding: 16px 16px 0; display: flex; gap: 8px; scrollbar-width: none; }
  .month-scroll::-webkit-scrollbar { display: none; }
  .month-chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px;
    border: 1px solid var(--border); background: white; cursor: pointer;
    font-family: inherit; color: var(--muted); transition: all 0.2s;
  }
  .month-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Main */
  main { padding: 16px 16px calc(32px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }

  /* KPI grid */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .kpi-card {
    background: white; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; border-top: 3px solid var(--border);
  }
  .kpi-card.income { border-top-color: var(--green); }
  .kpi-card.expense { border-top-color: var(--red); }
  .kpi-card.savings { border-top-color: var(--blue); }
  .kpi-card.balance-pos { border-top-color: var(--green); }
  .kpi-card.balance-neg { border-top-color: var(--red); }
  .kpi-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; }
  .kpi-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.blue { color: var(--blue); }

  /* Section title */
  .section-title {
    font-size: 11px; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin: 20px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* List */
  .list-card { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .list-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid #F5F0E8; font-size: 14px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row-label { display: flex; align-items: center; gap: 8px; color: var(--text); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .list-row-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }

  /* Bar chart */
  .bar-wrap { margin-bottom: 10px; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .bar-track { background: #F0EBE3; border-radius: 3px; height: 7px; }
  .bar-fill { height: 7px; border-radius: 3px; transition: width 0.5s ease; }

  /* Edit button */
  .edit-btn {
    width: 100%; padding: 14px; background: #1A1A1A; color: #F7F4EF;
    border: none; border-radius: 8px; font-size: 14px; font-family: inherit;
    letter-spacing: 2px; cursor: pointer; margin-top: 20px; transition: background 0.2s;
  }
  .edit-btn:active { background: #333; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
    max-height: 90vh; overflow-y: auto; padding: 0 0 calc(16px + var(--safe-bottom));
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    position: sticky; top: 0; background: var(--bg); padding: 16px 20px;
    border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
    align-items: center; z-index: 10;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
  .modal-actions { display: flex; gap: 8px; }
  .btn-cancel {
    padding: 8px 16px; background: none; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--muted);
  }
  .btn-save {
    padding: 8px 18px; background: var(--green); color: white;
    border: none; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer;
  }

  /* Form */
  .form-section { padding: 16px 20px; }
  .form-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 16px; font-family: 'DM Mono', monospace; background: white;
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* Live preview in modal */
  .preview-strip {
    display: flex; gap: 8px; padding: 12px 20px; background: #EEEAE3;
    border-bottom: 1px solid var(--border);
  }
  .preview-item { flex: 1; text-align: center; }
  .preview-item-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 3px; }
  .preview-item-value { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }

  /* Year view */
  .year-bars { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .year-chart { display: flex; gap: 4px; align-items: flex-end; height: 100px; margin-bottom: 12px; }
  .year-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .year-col-bars { display: flex; gap: 1px; align-items: flex-end; height: 90px; }
  .year-bar { width: 6px; border-radius: 2px 2px 0 0; transition: height 0.5s ease; min-height: 2px; }
  .year-col-label { font-size: 9px; color: var(--muted); margin-top: 4px; }
  .legend { display: flex; gap: 12px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .year-table { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 16px; }
  .year-table-header {
    display: grid; grid-template-columns: 40px 1fr 1fr 1fr 1fr;
    padding: 8px 12px; background: #EEEAE3;
    font-size: 10px; letter-spacing: 1px; color: var(--muted);
  }
  .year-table-header span:not(:first-child) { text-align: right; }
  .year-table-row {
    display: grid; grid-template-columns: 40px 1fr 1fr 1fr 1fr;
    padding: 10px 12px; border-top: 1px solid #F5F0E8; font-size: 12px;
  }
  .year-table-row span:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; }
  .year-table-row.current-month { background: #FFF8F2; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="header-sub">Household Finance</div>
      <div class="header-title">家計帳</div>
    </div>
    <div class="year-nav">
      <button class="year-btn" onclick="changeYear(-1)">◀</button>
      <div class="year-label" id="yearLabel"></div>
      <button class="year-btn" onclick="changeYear(1)">▶</button>
    </div>
  </div>
</header>

<div class="tabbar">
  <button class="tab active" onclick="switchTab('month', this)">月別</button>
  <button class="tab" onclick="switchTab('year', this)">年間</button>
</div>

<div id="monthChips" class="month-scroll"></div>

<main id="mainContent"></main>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-save" onclick="saveModal()">保存</button>
      </div>
    </div>
    <div class="preview-strip">
      <div class="preview-item">
        <div class="preview-item-label">収入</div>
        <div class="preview-item-value green" id="previewIncome">—</div>
      </div>
      <div class="preview-item">
        <div class="preview-item-label">支出</div>
        <div class="preview-item-value red" id="previewExpense">—</div>
      </div>
      <div class="preview-item">
        <div class="preview-item-label">収支</div>
        <div class="preview-item-value" id="previewBalance">—</div>
      </div>
    </div>
    <div id="modalForm"></div>
  </div>
</div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CATS = [
  { key:'housing', label:'住居費', color:'#4A7A65' },
  { key:'food', label:'食費', color:'#C8956C' },
  { key:'transport', label:'交通費', color:'#7B9E87' },
  { key:'utilities', label:'水道光熱費', color:'#5B7FA6' },
  { key:'insurance', label:'保険', color:'#9B7DB5' },
  { key:'entertainment', label:'娯楽・交際費', color:'#C87C7C' },
  { key:'clothing', label:'衣服・美容', color:'#D4A96A' },
  { key:'education', label:'自己投資・教育', color:'#6B9E9E' },
  { key:'other', label:'その他', color:'#999' },
];

const now = new Date();
let currentYear = now.getFullYear();
let currentMonth = now.getMonth();
let currentTab = 'month';
let draft = null;

// Storage
function loadAll() {
  try { return JSON.parse(localStorage.getItem('kakei-v2') || '{}'); } catch { return {}; }
}
function saveAll(data) {
  localStorage.setItem('kakei-v2', JSON.stringify(data));
}

function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function getMonth(y, m) {
  const d = loadAll()[monthKey(y,m)];
  return d || { salary:'', savings:'', expenses:{} };
}

function fmt(n) { return n ? '¥' + Number(n).toLocaleString() : '—'; }
function num(v) { return Number(v) || 0; }
function totalExp(d) { return CATS.reduce((s,c) => s + num(d.expenses?.[c.key]), 0); }

// Init
function init() {
  document.getElementById('yearLabel').textContent = currentYear;
  renderMonthChips();
  render();
}

function changeYear(d) {
  currentYear += d;
  document.getElementById('yearLabel').textContent = currentYear;
  renderMonthChips();
  render();
}

function renderMonthChips() {
  const el = document.getElementById('monthChips');
  if (currentTab !== 'month') { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = MONTHS.map((m,i) => `
    <button class="month-chip ${i===currentMonth?'active':''}" onclick="selectMonth(${i})">${m}</button>
  `).join('');
  // scroll active into view
  setTimeout(() => {
    const active = el.querySelector('.active');
    if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

function selectMonth(m) {
  currentMonth = m;
  renderMonthChips();
  render();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderMonthChips();
  render();
}

function render() {
  if (currentTab === 'month') renderMonth();
  else renderYear();
}

function renderMonth() {
  const d = getMonth(currentYear, currentMonth);
  const inc = num(d.salary);
  const sav = num(d.savings);
  const exp = totalExp(d);
  const bal = inc - exp - sav;
  const hasData = inc || exp || sav;

  const balClass = bal >= 0 ? 'green' : 'red';
  const balColor = bal >= 0 ? 'var(--green)' : 'var(--red)';

  let html = `
    <div class="kpi-grid">
      <div class="kpi-card income">
        <div class="kpi-label">収入</div>
        <div class="kpi-value green">${fmt(inc)}</div>
      </div>
      <div class="kpi-card expense">
        <div class="kpi-label">支出合計</div>
        <div class="kpi-value red">${fmt(exp)}</div>
      </div>
      <div class="kpi-card savings">
        <div class="kpi-label">貯蓄</div>
        <div class="kpi-value blue">${fmt(sav)}</div>
      </div>
      <div class="kpi-card ${bal>=0?'balance-pos':'balance-neg'}">
        <div class="kpi-label">収支差引</div>
        <div class="kpi-value ${balClass}">${hasData ? fmt(bal) : '—'}</div>
      </div>
    </div>
  `;

  if (hasData) {
    html += `<div class="section-title">収支内訳</div>`;
    html += `<div class="list-card">`;
    html += `<div class="list-row"><span class="list-row-label">💴 給与（手取り）</span><span class="list-row-value" style="color:var(--green)">${fmt(inc)}</span></div>`;
    html += `<div class="list-row"><span class="list-row-label">🏦 貯蓄（銀行）</span><span class="list-row-value" style="color:var(--blue)">${fmt(sav)}</span></div>`;
    html += `</div>`;

    const expItems = CATS.filter(c => num(d.expenses?.[c.key]) > 0);
    if (expItems.length) {
      html += `<div class="section-title">支出カテゴリ</div>`;
      html += `<div class="list-card">`;
      expItems.forEach(c => {
        const v = num(d.expenses?.[c.key]);
        const pct = exp ? Math.round(v/exp*100) : 0;
        html += `
          <div class="list-row" style="flex-direction:column;align-items:stretch;gap:6px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="list-row-label"><span class="dot" style="background:${c.color}"></span>${c.label}</span>
              <span class="list-row-value">${pct}%　${fmt(v)}</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
          </div>`;
      });
      html += `</div>`;
    }
  } else {
    html += `<div class="empty-state">まだデータがありません<br><small>下のボタンから入力してください</small></div>`;
  }

  html += `<button class="edit-btn" onclick="openModal()">✎ ${MONTHS[currentMonth]}を入力する</button>`;
  document.getElementById('mainContent').innerHTML = html;
}

function renderYear() {
  const summary = Array.from({length:12}, (_,i) => {
    const d = getMonth(currentYear, i);
    const inc = num(d.salary), sav = num(d.savings), exp = totalExp(d);
    return { month:i, inc, sav, exp, bal: inc - exp - sav };
  });
  const maxVal = Math.max(...summary.map(m => Math.max(m.inc, m.exp + m.sav)), 1);

  const totInc = summary.reduce((s,m)=>s+m.inc,0);
  const totExp = summary.reduce((s,m)=>s+m.exp,0);
  const totSav = summary.reduce((s,m)=>s+m.sav,0);
  const totBal = totInc - totExp - totSav;

  let html = `
    <div class="kpi-grid" style="margin-top:16px">
      <div class="kpi-card income"><div class="kpi-label">年収入合計</div><div class="kpi-value green">${fmt(totInc)}</div></div>
      <div class="kpi-card expense"><div class="kpi-label">年支出合計</div><div class="kpi-value red">${fmt(totExp)}</div></div>
      <div class="kpi-card savings"><div class="kpi-label">年貯蓄合計</div><div class="kpi-value blue">${fmt(totSav)}</div></div>
      <div class="kpi-card ${totBal>=0?'balance-pos':'balance-neg'}"><div class="kpi-label">年間収支</div><div class="kpi-value ${totBal>=0?'green':'red'}">${fmt(totBal)}</div></div>
    </div>
    <div class="section-title">月別グラフ</div>
    <div class="year-bars">
      <div class="year-chart">
        ${summary.map(m => {
          const incH = Math.round(m.inc/maxVal*88);
          const expH = Math.round(m.exp/maxVal*88);
          const savH = Math.round(m.sav/maxVal*88);
          return `<div class="year-col">
            <div class="year-col-bars">
              <div class="year-bar" style="height:${incH}px;background:var(--green)"></div>
              <div class="year-bar" style="height:${expH}px;background:var(--red)"></div>
              <div class="year-bar" style="height:${savH}px;background:var(--blue)"></div>
            </div>
            <div class="year-col-label">${m.month+1}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>収入</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>支出</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>貯蓄</div>
      </div>
    </div>
    <div class="year-table">
      <div class="year-table-header">
        <span>月</span><span>収入</span><span>支出</span><span>貯蓄</span><span>収支</span>
      </div>
      ${summary.map(m => `
        <div class="year-table-row ${m.month===currentMonth?'current-month':''}">
          <span style="color:${m.month===currentMonth?'var(--accent)':'var(--muted)'}">${m.month+1}月</span>
          <span style="color:var(--green)">${m.inc?fmt(m.inc):'—'}</span>
          <span style="color:var(--red)">${m.exp?fmt(m.exp):'—'}</span>
          <span style="color:var(--blue)">${m.sav?fmt(m.sav):'—'}</span>
          <span style="color:${m.bal>=0?'var(--green)':'var(--red)'}">${(m.inc||m.exp)?fmt(m.bal):'—'}</span>
        </div>`).join('')}
    </div>
  `;
  document.getElementById('mainContent').innerHTML = html;
}

// Modal
function openModal() {
  const d = getMonth(currentYear, currentMonth);
  draft = JSON.parse(JSON.stringify(d));
  if (!draft.expenses) draft.expenses = {};

  document.getElementById('modalTitle').textContent = `${currentYear}年 ${MONTHS[currentMonth]}`;
  renderModalForm();
  updatePreview();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  draft = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderModalForm() {
  let html = `
    <div class="form-section">
      <label class="form-label">💴 給与（手取り）</label>
      <input class="form-input" type="number" inputmode="numeric" placeholder="例：550000"
        value="${draft.salary||''}" oninput="draft.salary=this.value;updatePreview()">
    </div>
    <div class="form-divider"></div>
    <div class="form-section">
      <div class="form-label" style="margin-bottom:12px">支出カテゴリ</div>
      <div class="form-grid">
        ${CATS.map(c => `
          <div>
            <label class="form-label" style="display:flex;align-items:center;gap:5px">
              <span style="width:7px;height:7px;border-radius:50%;background:${c.color};display:inline-block"></span>${c.label}
            </label>
            <input class="form-input" type="number" inputmode="numeric" placeholder="0"
              value="${draft.expenses?.[c.key]||''}"
              oninput="draft.expenses['${c.key}']=this.value;updatePreview()">
          </div>`).join('')}
      </div>
    </div>
    <div class="form-divider"></div>
    <div class="form-section">
      <label class="form-label">🏦 貯蓄（銀行）</label>
      <input class="form-input" type="number" inputmode="numeric" placeholder="例：100000"
        value="${draft.savings||''}" oninput="draft.savings=this.value;updatePreview()">
    </div>
  `;
  document.getElementById('modalForm').innerHTML = html;
}

function updatePreview() {
  if (!draft) return;
  const inc = num(draft.salary);
  const exp = totalExp(draft);
  const sav = num(draft.savings);
  const bal = inc - exp - sav;
  document.getElementById('previewIncome').textContent = fmt(inc);
  document.getElementById('previewExpense').textContent = fmt(exp);
  const pb = document.getElementById('previewBalance');
  pb.textContent = fmt(bal);
  pb.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';
}

function saveModal() {
  const all = loadAll();
  all[monthKey(currentYear, currentMonth)] = draft;
  saveAll(all);
  closeModal();
  render();
}

// PWA
if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', e => e.waitUntil(
      caches.open('kakei-v1').then(c => c.addAll(['./', './index.html']))
    ));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request))
    ));
  `;
  const blob = new Blob([sw], {type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url);
}

init();
</script>
</body>
</html>
